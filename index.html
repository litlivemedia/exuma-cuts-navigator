<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0c4a6e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>The Cut Navigator — Exumas & Ragged Islands</title>
  </head>
  <body>
    <!-- Netlify Forms: hidden form for bot detection (SPA) -->
    <form name="transit-report" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="cutId" />
      <input name="cutName" />
      <input name="transitTime" />
      <input name="direction" />
      <input name="currentStrength" />
      <input name="currentDirection" />
      <input name="slackObserved" />
      <input name="depth" />
      <input name="windConditions" />
      <input name="seaConditions" />
      <input name="notes" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
